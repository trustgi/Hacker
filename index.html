            function nextLine() {
                if (Math.random() < 0.3) {

            // ----- параметры потока -----
            const MAX_LINES = 1000;
            let linesCount = 0;

            function removeOldestIfNeeded() {
                while (linesCount > MAX_LINES) {
                    output.removeChild(output.firstChild);
                    linesCount--;
                }
            }

            function scrollToBottom() {
                window.scrollTo(0, document.body.scrollHeight);
            }

            // ----- анимация печати по буквам -----
            function animateLine(text, container) {
                let index = 0;
                const total = text.length;
                const stepDelay = Math.floor(Math.random() * 30) + 20;

                function addChar() {
                    if (!container.parentNode) return;
                    if (index < total) {
                        container.textContent += text[index];
                        index++;
                        scrollToBottom();
                        setTimeout(addChar, stepDelay);
                    }
                }
                addChar();
            }

            // ----- добавление одной строки -----
            function processNextLine() {
                const useAnimation = Math.random() < 0.005;
                const lineText = nextLine();

                const lineDiv = document.createElement('div');
                lineDiv.className = 'line';
                output.appendChild(lineDiv);
                linesCount++;

                removeOldestIfNeeded();

                if (useAnimation) {
                    lineDiv.textContent = '';
                    animateLine(lineText, lineDiv);
                } else {
                    lineDiv.textContent = lineText;
                    scrollToBottom();
                }

                generateNextLine();
            }

            // ----- планировщик строк (5–15 мс) -----
            function generateNextLine() {
                const delay = Math.floor(Math.random() * 11) + 5;
                setTimeout(processNextLine, delay);
