            function showRandomBackgroundImage() {
                if (!active) return;
                const imgUrl = imageUrls[Math.floor(Math.random() * imageUrls.length)];
                const img = document.createElement('img');
                img.src = imgUrl;
                img.className = 'bg-image';
                img.alt = '';

                img.onerror = function() {
                    if (img.parentNode) img.parentNode.removeChild(img);
                };

                bgLayer.appendChild(img);

                img.onload = function() {
                    if (!active) {
                        if (img.parentNode) img.parentNode.removeChild(img);
                        return;
                    }
                    const duration = Math.floor(Math.random() * 3000) + 2000; // 2–4 секунды
                    const stopFlicker = startFlicker(img, duration);

                    safeSetTimeout(() => {
                        stopFlicker();
                        if (img.parentNode) img.parentNode.removeChild(img);
                    }, duration);
                };

                const nextInterval = Math.floor(Math.random() * 6000) + 3000; // 12–18 сек
                safeSetTimeout(showRandomBackgroundImage, nextInterval);
            }

            // ----- Запуск активности (через 10 секунд) -----
            function start() {
                active = true;

                // Начальное заполнение экрана (20 строк)
                for (let i = 0; i < 20; i++) {
                    const lineDiv = document.createElement('div');
                    lineDiv.className = 'line';
                    lineDiv.textContent = nextLine();
                    linesWrapper.appendChild(lineDiv);
                    linesCount++;
                }
                scrollToBottom();

                // Запускаем бесконечную генерацию строк
                generateNextLine();

                // Запускаем мемные сообщения и фоновые картинки с небольшими задержками
                safeSetTimeout(showRandomMessage, Math.floor(Math.random() * 4000) + 2000);
                safeSetTimeout(showRandomBackgroundImage, Math.floor(Math.random() * 4000) + 3000);
            }

            // ----- Остановка активности (через 9999 секунд) -----
            function stop() {
                active = false;
                clearAllTimers();
                // Можно также очистить экран, если требуется, но по условию просто останавливаем генерацию
            }

            // ----- Планируем старт и стоп -----
            safeSetTimeout(start, 20000);       // через 20 секунд
            safeSetTimeout(stop, 9999000);       // через 9999 секунд (9999 * 1000)
        })();
    </script>
